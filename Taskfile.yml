# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

environment:
  GOPROXY: https://proxy.golang.org,direct

vars:
  HOME:
    sh: echo $HOME
  BINARY_NAME: repo-opener
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  DATE:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  GOLDFLAGS: "-s -w -X main.Version={{.VERSION}} -X main.Commit={{.COMMIT}} -X main.Date={{.DATE}} -X main.BuiltBy=taskfile"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  run:cmd:
    desc: Run via go run
    cmds:
      - "go run . {{ .CLI_ARGS }}"

  run:bin:
    desc: Run as binary
    deps:
      - build:bin
    cmds:
      - "{{ .HOME }}/go/bin/{{ .BINARY_NAME }} {{ .CLI_ARGS }}"

  tidy:
    desc: Tidy go modules
    preconditions:
      - test -f go.mod
    cmds:
      - "go mod tidy"

  build:bin:
    desc: Build binary into $HOME/go/bin
    preconditions:
      - test -f go.mod
    cmds:
      - "go mod download"
      - "CGO_ENABLED=0 go build -ldflags '{{ .GOLDFLAGS }}' -o {{ .HOME }}/go/bin/{{ .BINARY_NAME }} ."

  install:
    desc: Build and install locally with version info
    cmds:
      - "CGO_ENABLED=0 go install -ldflags '{{ .GOLDFLAGS }}' ."

  fmt:
    desc: Run formatters
    cmds:
      - "gofmt -s -w ."
      - "goimports -format-only -d -l -v -w ."

  vet:
    desc: Run go vet ./...
    cmds:
      - "go vet ./..."

  test:
    desc: Run all tests with coverage and race detector
    cmds:
      - "go test -coverprofile=cover.out -v ./..."
      - task: test:race
      - task: test:coverage

  test:short:
    desc: Run short tests
    cmds:
      - "go test --short -coverprofile=cover.out -v ./..."

  test:coverage:
    desc: Show test coverage report
    cmds:
      - "go tool cover -func=cover.out"

  test:race:
    desc: Run tests with the race detector
    cmds:
      - "go test -race -v ./..."

  test:watch:
    desc: Run tests with watchexec
    cmds:
      - "watchexec -c clear -o do-nothing -d 100ms --exts go 'pkg=\".${WATCHEXEC_COMMON_PATH/$PWD/}/...\"; echo \"running tests for $pkg\"; go test \"$pkg\"'"

  lint:
    desc: Run all linters
    cmds:
      - task: lint:golangci
      - task: lint:bearer

  lint:golangci:
    desc: Run golangci-lint
    cmds:
      - "golangci-lint -v run --output.text.colors"

  lint:bearer:
    desc: Run Bearer security scan
    cmds:
      - "bearer scan . --config-file bearer.yml"

  release:check:
    desc: Validate the GoReleaser configuration
    preconditions:
      - sh: command -v goreleaser
        msg: "goreleaser is not installed: https://goreleaser.com/install/"
    cmds:
      - "goreleaser check"

  release:snapshot:
    desc: Build a local snapshot release (no publish)
    preconditions:
      - sh: command -v goreleaser
        msg: "goreleaser is not installed: https://goreleaser.com/install/"
    cmds:
      - "goreleaser release --snapshot --clean --skip=publish"

  clean:
    desc: Remove build and test artifacts
    cmds:
      - "rm -rf dist cover.out"
